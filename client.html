<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Summary</title>

<style>
body{
    font-family:Segoe UI;
    margin:0;
    background:linear-gradient(135deg,#dfe9f3,#f5f7fa);
}

.header{
    background:#2c5fa8;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    padding:20px;
    max-width:1000px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
    font-size:13px;
}

th{
    background:#2c5fa8;
    color:white;
}

tr:nth-child(even){
    background:#f5f7fa;
}

tr:hover{
    background:#eaf2ff;
}

button{
    padding:8px 12px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>CLIENT SUMMARY</h2>
</div>

<div class="container">

<button onclick="window.location.href='index.html'">⬅ Back to Cheques</button>

<label>From:</label>
<input type="date" id="fromDate">

<label>To:</label>
<input type="date" id="toDate">

<button onclick="renderClientSummary()">Apply</button>

<table id="clientTable"></table>

</div>

<script>

let cheques = JSON.parse(localStorage.getItem("cheques")) || [];

function renderClientSummary(){

    const table = document.getElementById("clientTable");

    const fromDate = document.getElementById("fromDate").value;
    const toDate = document.getElementById("toDate").value;

    table.innerHTML = `
    <tr>
        <th>Client</th>
        <th>Total Cheques</th>
        <th>Active</th>
        <th>Total Amount</th>
        <th>Deposited</th>
        <th>Pending</th>
        <th>Paid Cash</th>
        <th>Returned</th>
    </tr>`;

    const summary = {};

    cheques.forEach(c => {

        if(!c.due) return;

        const due = new Date(c.due);

        if(fromDate && due < new Date(fromDate)) return;
        if(toDate && due > new Date(toDate)) return;

        if(!summary[c.client]){
            summary[c.client] = {
                total: 0,
                active: 0,
                amount: 0,
                deposited: 0,
                pending: 0,
                cash: 0,
                returned: 0
            };
        }

        summary[c.client].total++;
        summary[c.client].amount += Number(c.amount || 0);

        if(c.status === "Deposited") summary[c.client].deposited++;
        if(c.status === "Pending") summary[c.client].pending++;
        if(c.status === "Paid (Cash)") summary[c.client].cash++;
        if((c.status || "").trim().toLowerCase() === "returned to client"){
    summary[c.client].returned++;
}

        if(c.status === "Pending" || c.status === "Bounced Cheque"){
            summary[c.client].active++;
        }
    });

    const sorted = Object.entries(summary)
    .sort((a,b)=> b[1].amount - a[1].amount);

    let grandTotal = 0;

    if(sorted.length === 0){
        table.innerHTML += `
        <tr>
            <td colspan="8">No data found</td>
        </tr>`;
        return;
    }

    sorted.forEach(([client, s], index)=>{

        grandTotal += s.amount;

        table.innerHTML += `
        <tr>
            <td style="text-align:left; cursor:pointer; color:#2c5fa8;"
            onclick="viewClient('${client}')">
            ${client}
            </td>
            <td>${s.total}</td>
            <td>${s.active}</td>
            <td>QAR ${s.amount.toLocaleString()}</td>
            <td>${s.deposited}</td>
            <td>${s.pending}</td>
            <td>${s.cash}</td>
            <td>${s.returned}</td>
        </tr>`;
    });

    table.innerHTML += `
    <tr style="font-weight:bold; background:#f1f4f9;">
        <td>TOTAL</td>
        <td></td>
        <td></td>
        <td>QAR ${grandTotal.toLocaleString()}</td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
    </tr>`;
}

function viewClient(name){
    localStorage.setItem("selectedClient", name);
    window.location.href = "client-details.html";
}

renderClientSummary();

</script>

</body>
</html>
