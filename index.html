<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do Dashboard</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
body {
    font-family:'Segoe UI', Arial;
    margin:0;
    background: linear-gradient(135deg,#dfe9f3,#f5f7fa);
}
.header {
    background: linear-gradient(135deg,#2c5fa8,#1f4f91);
    color:white;
    text-align:center;
    padding:12px 10px;
}
.header h1{margin:0;font-size:20px;}
.header p{margin:2px 0 0;font-size:12px;}

.container {
    padding:20px;
    max-width:1100px;
    margin:auto;
    overflow-x:auto; /* ✅ ADD THIS */
}

.cards { display:flex; gap:15px; flex-wrap:wrap; }
.card {
    flex:1; min-width:160px;
    background:linear-gradient(135deg,#ffffff,#f1f4f9);
    border-radius:12px; text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.card-header { padding:10px; color:white; font-weight:bold; }
.card-body { font-size:24px; padding:18px; }

.blue{background:#2c5fa8;}
.green{background:#2fa84f;}
.red{background:#d83b3b;}
.orange{background:#f39c12;}
.gray{background:#7f8c8d;}

.open-btn {
    margin-top:20px;
    padding:10px 15px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.controls { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.controls input, .controls select {
    padding:8px; border-radius:6px; border:1px solid #ccc;
}

table {
    width:100%; border-collapse:collapse; margin-top:20px;
    background:linear-gradient(135deg,#ffffff,#f4f7fb);
    border-radius:10px; overflow:hidden;
}
th, td {
    border:1px solid #d6dee6;
    padding:14px 18px;
    text-align:center;
}
th { background:#2c5fa8; color:white; }
tr:nth-child(even){ background:#f1f5fa; }

.badge { padding:6px 10px; border-radius:6px; color:white; font-size:12px; }
.high{background:#e74c3c;}
.low{background:#f39c12;}
.progress-status{background:#3498db;}
.not{background:#7f8c8d;}
.done{background:#2ecc71;}

.action-btn {
    padding:6px 10px; margin:2px; border:none;
    border-radius:6px; cursor:pointer; font-size:12px;
}
.edit{
    background:#3498db;
    color:white;
    padding:5px 10px;
    border-radius:5px;
}

.delete{
    background:#e74c3c;
    color:white;
    padding:5px 10px;
    border-radius:5px;
}
    .modal{
    display:none;
    position:fixed;
    z-index:1000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}
.modal-content {
    background:linear-gradient(135deg,#ffffff,#eef3f9);
    margin:10% auto; padding:20px;
    width:90%; max-width:450px; border-radius:12px;
}
.close { float:right; font-size:20px; cursor:pointer; }

.form-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
}
.form-grid input,.form-grid select {
    width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
}
.form-grid button {
    grid-column:span 2;
    padding:10px; background:#2c5fa8; color:white;
    border:none; border-radius:6px;
}
    #chequeTable td:last-child{
    white-space: nowrap;
}

#chequeTable td:last-child button{
    display:inline-block;
    margin:2px;
}
    /* ===== CHEQUE STATUS COLORS ===== */
.status-badge{
    padding:6px 10px;
    border-radius:6px;
    color:white;
    font-size:12px;
    font-weight:bold;
    display:inline-block;
    white-space: nowrap;
}

.pending{background:#f39c12;}
.deposited{background:#3498db;}
.paid{background:#2ecc71;}
.returned{background:#e74c3c;}
    /* OVERDUE ROW */
.overdue-row{
    background:#ffe5e5 !important;
}
   #chequeTable td,
#chequeTable th{
    white-space: nowrap;
}
    .section-box{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
    margin-top:15px;
}

.section-title{
    font-weight:bold;
    margin-bottom:10px;
    color:#2c5fa8;
}

.form-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

.form-row div{
    display:flex;
    flex-direction:column;
}

.primary-btn{
    background:#2c5fa8;
    color:white;
}

.secondary-btn{
    background:#ccc;
}
    /* ===== SCROLL FIX ===== */
#chequeSection{
    max-height: 90vh;
    overflow-y: auto;
}
/* FORCE HORIZONTAL SCROLL */
#chequeTable{
    min-width: 1500px;
}
  
#chequeTable{
    min-width: 1300px; /* adjust if needed */
}

#chequeTable th,
#chequeTable td{
    white-space: nowrap;
}
    /* ===== EXCEL STYLE SCROLLBAR ===== */
.table-scroll{
    width:100%;
    overflow-x:scroll;
    overflow-y:hidden;
    border:1px solid #ccc;
}

/* force wide table */
#chequeTable{
    min-width:1400px;
}

/* optional: always show scrollbar */
.table-scroll::-webkit-scrollbar{
    height:10px;
}
.table-scroll::-webkit-scrollbar-thumb{
    background:#999;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="header">
<h1>TO-DO LIST DASHBOARD</h1>
<p>PRODUCTIVITY OVERVIEW</p>
<p>JEMMEL LOZADA</p>
</div>

<!-- ================= TASK SECTION ================= -->
<div id="taskSection" class="container">

<div class="cards">
<div class="card"><div class="card-header blue">TOTAL</div><div class="card-body" id="total">0</div></div>
<div class="card"><div class="card-header green">COMPLETED</div><div class="card-body" id="completed">0</div></div>
<div class="card"><div class="card-header red">PENDING</div><div class="card-body" id="pending">0</div></div>
<div class="card"><div class="card-header orange">IN PROGRESS</div><div class="card-body" id="inprogress">0</div></div>
<div class="card"><div class="card-header gray">NOT STARTED</div><div class="card-body" id="notstarted">0</div></div>
</div>

<button class="open-btn" onclick="openModal()">+ Add Task</button>
<button class="open-btn" onclick="showCheque()">💰 Cheque System</button>
<button class="open-btn" onclick="window.location.href='client.html'">
📊 Client Summary
</button>

<table id="table"></table>

</div>

<!-- ================= CHEQUE SECTION (FIXED) ================= -->
<!-- ================= CHEQUE SECTION (FINAL FIXED) ================= -->
<div id="chequeSection" class="container" style="display:none;">

<h2>Cheque System</h2>

<!-- CARDS -->
<div class="cards">
<div class="card"><div class="card-header green">COLLECTED</div><div class="card-body" id="totalCollected">0</div></div>
<div class="card"><div class="card-header orange">PENDING</div><div class="card-body" id="totalPending">0</div></div>
<div class="card"><div class="card-header red">RETURNED</div><div class="card-body" id="totalReturned">0</div></div>
</div>

<div style="margin:10px 0; font-weight:bold;">
Returned to Client: <span id="returnedClientCount">0</span>
</div>

<!-- FILTER BOX -->
<div class="section-box">
<div class="section-title">Filters</div>

<div class="controls">
<div id="statusFilter">

<label><input type="checkbox" value="Pending" onchange="renderCheque()"> Pending</label>

<label><input type="checkbox" value="Deposited" onchange="renderCheque()"> Deposited</label>

<label><input type="checkbox" value="Paid (Cash)" onchange="renderCheque()"> Paid</label>

<label><input type="checkbox" value="Bounced Cheque" onchange="renderCheque()"> Bounced</label>

<label><input type="checkbox" value="Returned to Client" onchange="renderCheque()"> Returned</label>

</div>

<select id="filterMonth" onchange="renderCheque()">
<option value="All">All Dates</option>
</select>

<input id="searchClient" placeholder="Search client..." onkeyup="renderCheque()">
</div>
</div>

<!-- FORM BOX -->
<div class="section-box">
<div class="section-title">Add Cheque</div>

<div class="form-row">
<input id="client" placeholder="Client Name">
<input id="chequeNo" placeholder="Cheque No">
<input id="amount" type="number" placeholder="Amount">
<input id="narration" placeholder="Narration (e.g. Payment for invoice #123)">

<select id="chequeStatus">
<option>Pending</option>
<option>Deposited</option>
<option>Paid (Cash)</option>
<option>Bounced Cheque</option>
<option>Cleared</option>
<option>Returned to Client</option>
</select>
</div>

<div class="form-row">

<div>
<label>Due Date (PDC)</label>
<input id="chequeDue" type="date">
</div>

<div>
<label>Transaction Date</label>
<input id="transDate" type="date">
</div>

</div>

<div style="margin-top:10px;">
<button class="primary-btn" onclick="addCheque()">Save Cheque</button>
<button onclick="migrateLocalToFirebase()">⚡ Migrate Old Data</button>
<button class="secondary-btn" onclick="showTasks()">Back</button>
</div>

</div>

<hr style="margin:20px 0;">

<!-- TABLE -->
<div class="table-scroll">
    <table id="chequeTable"></table>
</div>
    </div>
<!-- ================= MODAL (UNCHANGED) ================= -->
<div id="taskModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">×</span>

<h3>Add Task</h3>

<div class="form-grid">
<input type="text" id="task" placeholder="Task name">

<select id="category">
<option>Work</option>
<option>Personal</option>
<option>Learning</option>
<option>Health</option>
</select>

<select id="priority">
<option>High</option>
<option>Low</option>
</select>

<select id="status">
<option>Completed</option>
<option>In Progress</option>
<option>Not Started</option>
</select>

<input type="date" id="due">

<button onclick="addTask()">Save Task</button>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCPqUqKjTLA92JAGAdWVrKSafprhxilKKI",
  authDomain: "cheque-5ca3f.firebaseapp.com",
  projectId: "cheque-5ca3f",
  storageBucket: "cheque-5ca3f.firebasestorage.app",
  messagingSenderId: "950469457707",
  appId: "1:950469457707:web:a262a1fbe64793cdfa776e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
   // ================== AUTO FIX PATCH ==================

const client = document.getElementById("client");
const chequeNo = document.getElementById("chequeNo");
const amount = document.getElementById("amount");
const chequeDue = document.getElementById("chequeDue");
const transDate = document.getElementById("transDate");
const chequeStatus = document.getElementById("chequeStatus");
const narration = document.getElementById("narration");

const searchClient = document.getElementById("searchClient");
const filterMonth = document.getElementById("filterMonth");

window.showCheque = function(){
    document.getElementById("taskSection").style.display = "none";
    document.getElementById("chequeSection").style.display = "block";
}
// ================== END PATCH ==================
 
/* ===== CHEQUE SYSTEM ===== */
let cheques = [];
let chequeEditIndex = -1;

/* ADD CHEQUE */
async function addCheque(){
    const data = {
        client: client.value,
        chequeNo: chequeNo.value,
        amount: amount.value,
        due: chequeDue.value,
        transDate: transDate.value,
        status: chequeStatus.value,
        narration: narration.value || ""
    };

    if(!data.client) return alert("Enter client");

    try {
        if(chequeEditIndex !== -1){
            await deleteDoc(doc(db, "cheques", cheques[chequeEditIndex].id));
            await addDoc(collection(db, "cheques"), data);
            chequeEditIndex = -1;
        } else {
            await addDoc(collection(db, "cheques"), data);
        }

        client.value="";
        chequeNo.value="";
        amount.value="";
        chequeDue.value="";
        transDate.value="";
        narration.value="";

        await loadCheques();

    } catch(e){
        alert("Error: " + e.message);
        console.error(e);
    }
}

/* LOAD FROM FIREBASE */
async function loadCheques(){

    cheques = [];

    const querySnapshot = await getDocs(collection(db, "cheques"));

    querySnapshot.forEach((docSnap)=>{
        cheques.push({ id: docSnap.id, ...docSnap.data() });
    });

    renderCheque();
    populateMonthFilter();

    localStorage.setItem("cheques", JSON.stringify(cheques));
}
/* RENDER TABLE */
function renderCheque(){

    const table = document.getElementById("chequeTable");

    const selectedStatus = [...document.querySelectorAll('#statusFilter input:checked')]
    .map(cb => cb.value.toLowerCase().trim());

    const search = (searchClient.value || "").toLowerCase();
    const monthFilter = filterMonth.value;

    table.innerHTML = `
    <tr>
    <th>#</th><th>Client</th><th>Cheque</th><th>Amount</th>
    <th>Due</th><th>Transaction</th><th>Status</th>
    <th>Reminder</th><th>Action</th><th>Narration</th>
    </tr>`;

    const today = new Date();

    cheques.forEach((c,i)=>{

        // FILTER STATUS
        if(selectedStatus.length && !selectedStatus.includes((c.status||"").toLowerCase())) return;

        // FILTER MONTH
        if(monthFilter !== "All" && c.due){
            const d = new Date(c.due);
            const key = d.getFullYear()+"-"+(d.getMonth()+1);
            if(key !== monthFilter) return;
        }

        // SEARCH
        if(search && !(c.client || "").toLowerCase().includes(search)) return;

        let reminder = "";
        let diff = 0;

        if(c.due){
            diff = Math.ceil((new Date(c.due) - today)/(1000*60*60*24));
        }

        if(c.status === "Pending"){
            if(diff > 1) reminder = "Due in "+diff+" days";
            else if(diff === 1) reminder = "Due tomorrow";
            else if(diff === 0) reminder = "Due today";
            else reminder = "Overdue";
        }

        if(c.status === "Deposited"){
            reminder = "For clearing";
        }

        table.innerHTML += `
        <tr class="${diff<0 && c.status==='Pending' ? 'overdue-row':''}">
        <td>${i+1}</td>
        <td>${c.client}</td>
        <td>${c.chequeNo}</td>
        <td>${c.amount}</td>
        <td>${c.due || "-"}</td>
        <td>${c.transDate || "-"}</td>
       <td>
<span class="status-badge ${c.status.toLowerCase().replace(/ /g,'-')}">${c.status}</span>
</td>
        <td>${reminder}</td>
        <td>
        <button onclick="editCheque(${i})">Edit</button>
        <button onclick="deleteCheque(${i})">Delete</button>
        </td>
        <td>${c.narration || "-"}</td>
        </tr>`;
    });
}

/* DELETE */
async function deleteCheque(i){
    if(confirm("Delete?")){
        await deleteDoc(doc(db, "cheques", cheques[i].id));
        await loadCheques();
    }
}

/* EDIT */
function editCheque(i){
    const c = cheques[i];
    client.value = c.client;
    chequeNo.value = c.chequeNo;
    amount.value = c.amount;
    chequeDue.value = c.due;
    transDate.value = c.transDate || "";
    chequeStatus.value = c.status;
    narration.value = c.narration || "";
    chequeEditIndex = i;
}

/* MONTH FILTER */
function populateMonthFilter(){
    filterMonth.innerHTML = '<option value="All">All Dates</option>';

    const unique = [...new Set(
        cheques.map(c=>{
            if(!c.due) return null;
            const d = new Date(c.due);
            return d.getFullYear()+"-"+(d.getMonth()+1);
        })
    )].filter(Boolean);

    unique.forEach(val=>{
        const [y,m] = val.split("-");
        const d = new Date(y, m-1);

        const opt = document.createElement("option");
        opt.value = val;
        opt.text = d.toLocaleString('default',{month:'long'})+" "+y;

        filterMonth.appendChild(opt);
    });
}

/* AUTO FILTER */
document.querySelectorAll('#statusFilter input').forEach(cb=>{
    cb.addEventListener("change", renderCheque);
});
searchClient.addEventListener("keyup", renderCheque);
filterMonth.addEventListener("change", renderCheque);

/* INIT */
loadCheques();

/* GLOBAL */

    // FIX BUTTONS (IMPORTANT)
window.addCheque = addCheque;
window.editCheque = editCheque;
window.deleteCheque = deleteCheque;
window.renderCheque = renderCheque;
   
window.showTasks = function(){
    document.getElementById("taskSection").style.display = "block";
    document.getElementById("chequeSection").style.display = "none";
}
   window.addTask = function(){
    alert("Task system working (temporary)");
}
    window.openModal = function(){
    document.getElementById("taskModal").style.display = "block";
}

window.closeModal = function(){
    document.getElementById("taskModal").style.display = "none";
}
</script>
    
</body>
