<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do Dashboard</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">

<style>
body {font-family:'Segoe UI', Arial;margin:0;background: linear-gradient(135deg,#dfe9f3,#f5f7fa);}
.header {background: linear-gradient(135deg,#2c5fa8,#1f4f91);color:white;text-align:center;padding:12px;}
.container { padding:20px; max-width:1100px; margin:auto; }

.open-btn {padding:10px 15px;background:#2c5fa8;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px;}

table {width:100%;border-collapse:collapse;margin-top:20px;}
th, td {border:1px solid #ccc;padding:10px;text-align:center;}
th {background:#2c5fa8;color:white;}

.red{color:red;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<h1>TO-DO LIST DASHBOARD</h1>
</div>

<!-- ================= TASK SECTION ================= -->
<div id="taskSection" class="container">

<button class="open-btn" onclick="openModal()">+ Add Task</button>
<button class="open-btn" onclick="showCheque()">💰 Cheque System</button>

<table id="table"></table>

</div>

<!-- ================= CHEQUE SECTION ================= -->
<div id="chequeSection" class="container" style="display:none;">

<h2>Cheque System</h2>

<input id="client" placeholder="Client Name">
<input id="chequeNo" placeholder="Cheque No">
<input id="amount" type="number" placeholder="Amount">
<input id="chequeDue" type="date">

<select id="chequeStatus">
<option>Pending</option>
<option>Deposited</option>
<option>Paid (Cash)</option>
<option>Returned</option>
</select>

<button onclick="addCheque()">Save Cheque</button>
<button onclick="showTasks()">⬅ Back</button>

<table id="chequeTable"></table>

</div>

<script>

/* ================= TASK SYSTEM ================= */

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let taskEditIndex = -1;

function render(){
    const table=document.getElementById("table");

    table.innerHTML=`
    <tr>
    <th>Task</th><th>Status</th><th>Action</th>
    </tr>`;

    tasks.forEach((t,i)=>{
        table.innerHTML+=`
        <tr>
        <td>${t.task}</td>
        <td>${t.status}</td>
        <td>
        <button onclick="editTask(${i})">Edit</button>
        <button onclick="del(${i})">Delete</button>
        </td>
        </tr>`;
    });
}

function addTask(){
    const task=document.getElementById("task").value;

    if(taskEditIndex===-1){
        tasks.push({task:task,status:"Pending"});
    }else{
        tasks[taskEditIndex].task=task;
        taskEditIndex=-1;
    }

    localStorage.setItem("tasks",JSON.stringify(tasks));
    render();
}

function editTask(i){
    document.getElementById("task").value=tasks[i].task;
    taskEditIndex=i;
}

function del(i){
    tasks.splice(i,1);
    localStorage.setItem("tasks",JSON.stringify(tasks));
    render();
}

/* ================= TOGGLE ================= */

function showCheque(){
    taskSection.style.display="none";
    chequeSection.style.display="block";
    renderCheque();
}

function showTasks(){
    taskSection.style.display="block";
    chequeSection.style.display="none";
}

/* ================= CHEQUE SYSTEM ================= */

let cheques = JSON.parse(localStorage.getItem("cheques")) || [];
let chequeEditIndex = -1;

function saveCheque(){
    localStorage.setItem("cheques", JSON.stringify(cheques));
}

function addCheque(){

    const data={
        client:client.value,
        chequeNo:chequeNo.value,
        amount:amount.value,
        due:chequeDue.value,
        status:chequeStatus.value
    };

    if(!data.client) return alert("Enter client");

    if(chequeEditIndex === -1){
        cheques.push(data);
    }else{
        cheques[chequeEditIndex] = data;
        chequeEditIndex = -1;
    }

    client.value="";
    chequeNo.value="";
    amount.value="";
    chequeDue.value="";

    saveCheque();
    renderCheque();
}

function renderCheque(){

    const table=document.getElementById("chequeTable");

    table.innerHTML=`
    <tr>
    <th>Client</th>
    <th>Cheque</th>
    <th>Amount</th>
    <th>Due</th>
    <th>Status</th>
    <th>Reminder</th>
    <th>Action</th>
    </tr>`;

    const today=new Date();

    cheques.forEach((c,i)=>{

        const dueDate=new Date(c.due);
        const diff=Math.ceil((dueDate - today)/(1000*60*60*24));

        let reminder="";

        if(c.status==="Pending"){
            if(diff<=3 && diff>=0) reminder="⚠ Due Soon";
            else if(diff<0) reminder="❌ Overdue";
        }

        table.innerHTML+=`
        <tr>
        <td>${c.client}</td>
        <td>${c.chequeNo}</td>
        <td>${c.amount}</td>
        <td>${c.due}</td>
        <td>${c.status}</td>
        <td class="${diff<=3?'red':''}">${reminder}</td>
        <td>
        <button onclick="editCheque(${i})">Edit</button>
        <button onclick="deleteCheque(${i})">Delete</button>
        </td>
        </tr>`;
    });
}

function editCheque(i){
    const c=cheques[i];
    client.value=c.client;
    chequeNo.value=c.chequeNo;
    amount.value=c.amount;
    chequeDue.value=c.due;
    chequeStatus.value=c.status;
    chequeEditIndex=i;
}

function deleteCheque(i){
    if(confirm("Delete?")){
        cheques.splice(i,1);
        saveCheque();
        renderCheque();
    }
}

render();

</script>

</body>
</html>
