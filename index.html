<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do Dashboard</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */
body {
    font-family:'Segoe UI', Arial;
    margin:0;
    background: linear-gradient(135deg,#dfe9f3,#f5f7fa);
}
.header {
    background: linear-gradient(135deg,#2c5fa8,#1f4f91);
    color:white;
    text-align:center;
    padding:12px 10px;
}
.header h1{margin:0;font-size:20px;}
.header p{margin:2px 0 0;font-size:12px;}

.container { padding:20px; max-width:1100px; margin:auto; }

.cards { display:flex; gap:15px; flex-wrap:wrap; }
.card {
    flex:1; min-width:160px;
    background:linear-gradient(135deg,#ffffff,#f1f4f9);
    border-radius:12px; text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}
.card-header { padding:10px; color:white; font-weight:bold; }
.card-body { font-size:24px; padding:18px; }

.blue{background:#2c5fa8;}
.green{background:#2fa84f;}
.red{background:#d83b3b;}
.orange{background:#f39c12;}
.gray{background:#7f8c8d;}

.open-btn {
    margin-top:20px;
    padding:10px 15px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.controls { display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
.controls input, .controls select {
    padding:8px; border-radius:6px; border:1px solid #ccc;
}

table {
    width:100%; border-collapse:collapse; margin-top:20px;
    background:linear-gradient(135deg,#ffffff,#f4f7fb);
    border-radius:10px; overflow:hidden;
}
th, td { border:1px solid #d6dee6; padding:12px; text-align:center; }
th { background:#2c5fa8; color:white; }
tr:nth-child(even){ background:#f1f5fa; }

.badge { padding:6px 10px; border-radius:6px; color:white; font-size:12px; }
.high{background:#e74c3c;}
.low{background:#f39c12;}
.progress-status{background:#3498db;}
.not{background:#7f8c8d;}
.done{background:#2ecc71;}

.action-btn {
    padding:6px 10px; margin:2px; border:none;
    border-radius:6px; cursor:pointer; font-size:12px;
}
.edit{background:#3498db;color:white;}
.delete{background:#e74c3c;color:white;}

.modal {
    display:none; position:fixed; z-index:1000;
    left:0; top:0; width:100%; height:100%;
    background:rgba(0,0,0,0.5);
}
.modal-content {
    background:linear-gradient(135deg,#ffffff,#eef3f9);
    margin:10% auto; padding:20px;
    width:90%; max-width:450px; border-radius:12px;
}
.close { float:right; font-size:20px; cursor:pointer; }

.form-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:12px;
}
.form-grid input,.form-grid select {
    width:100%; padding:10px; border:1px solid #ccc; border-radius:6px;
}
.form-grid button {
    grid-column:span 2;
    padding:10px; background:#2c5fa8; color:white;
    border:none; border-radius:6px;
}
    /* ===== CHEQUE STATUS COLORS ===== */
.status-badge{
    padding:6px 10px;
    border-radius:6px;
    color:white;
    font-size:12px;
    font-weight:bold;
}

.pending{background:#f39c12;}
.deposited{background:#3498db;}
.paid{background:#2ecc71;}
.returned{background:#e74c3c;}
    /* OVERDUE ROW */
.overdue-row{
    background:#ffe5e5 !important;
}
</style>
</head>

<body>

<div class="header">
<h1>TO-DO LIST DASHBOARD</h1>
<p>PRODUCTIVITY OVERVIEW</p>
<p>JEMMEL LOZADA</p>
</div>

<!-- ================= TASK SECTION ================= -->
<div id="taskSection" class="container">

<div class="cards">
<div class="card"><div class="card-header blue">TOTAL</div><div class="card-body" id="total">0</div></div>
<div class="card"><div class="card-header green">COMPLETED</div><div class="card-body" id="completed">0</div></div>
<div class="card"><div class="card-header red">PENDING</div><div class="card-body" id="pending">0</div></div>
<div class="card"><div class="card-header orange">IN PROGRESS</div><div class="card-body" id="inprogress">0</div></div>
<div class="card"><div class="card-header gray">NOT STARTED</div><div class="card-body" id="notstarted">0</div></div>
</div>

<button class="open-btn" onclick="openModal()">+ Add Task</button>
<button class="open-btn" onclick="showCheque()">💰 Cheque System</button>

<table id="table"></table>

</div>

<!-- ================= CHEQUE SECTION (NEW) ================= -->
<div id="chequeSection" class="container" style="display:none;">

<h2>Cheque System</h2>
    <div class="cards">
<div class="card"><div class="card-header green">COLLECTED</div><div class="card-body" id="totalCollected">0</div></div>
<div class="card"><div class="card-header orange">PENDING</div><div class="card-body" id="totalPending">0</div></div>
<div class="card"><div class="card-header red">RETURNED</div><div class="card-body" id="totalReturned">0</div></div>
</div>
    <div style="margin:10px 0; font-weight:bold;">
Returned to Client: <span id="returnedClientCount">0</span>
</div>
    
    <select id="filterStatus" onchange="renderCheque()">
<option value="All">All</option>
<option value="Pending">Pending</option>
<option value="Paid (Cash)">Paid (Cash)</option>
<option value="Deposited">Deposited</option>
<option value="Bounced Cheque">Bounced Cheque</option>
<option>Returned to Client</option>
</select>

<input id="client" placeholder="Client Name">
<input id="chequeNo" placeholder="Cheque No">
<input id="amount" type="number" placeholder="Amount">
<input id="chequeDue" type="date">

<select id="chequeStatus">
<option>Pending</option>
<option>Deposited</option>
<option>Paid (Cash)</option>
<option>Bounced Cheque</option>
<option>Cleared</option>
<option>Returned to Client</option>
</select>

<button onclick="addCheque()">Save Cheque</button>
<button onclick="showTasks()">⬅ Back</button>

<table id="chequeTable"></table>

</div>

<!-- ================= MODAL (UNCHANGED) ================= -->
<div id="taskModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">×</span>

<h3>Add Task</h3>

<div class="form-grid">
<input type="text" id="task" placeholder="Task name">

<select id="category">
<option>Work</option>
<option>Personal</option>
<option>Learning</option>
<option>Health</option>
</select>

<select id="priority">
<option>High</option>
<option>Low</option>
</select>

<select id="status">
<option>Completed</option>
<option>In Progress</option>
<option>Not Started</option>
</select>

<input type="date" id="due">

<button onclick="addTask()">Save Task</button>
</div>
</div>
</div>

<script>

/* ===== ORIGINAL TASK SYSTEM ===== */
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let editIndex = -1;

function save(){ localStorage.setItem("tasks", JSON.stringify(tasks)); }
function openModal(){ taskModal.style.display="block"; }
function closeModal(){ taskModal.style.display="none"; }

function render(){

    const table = document.getElementById("table");

    table.innerHTML=`
    <tr>
    <th>Task</th>
    <th>Category</th>
    <th>Priority</th>
    <th>Status</th>
    <th>Due</th>
    <th>Action</th>
    </tr>`;

    tasks.forEach((t,i)=>{
        table.innerHTML+=`
        <tr>
        <td>${t.task}</td>
        <td>${t.cat}</td>
        <td>${t.priority}</td>
        <td>${t.status}</td>
        <td>${t.due || '-'}</td>
        <td>
            <button class="action-btn edit" onclick="editTask(${i})">Edit</button>
            <button class="action-btn delete" onclick="del(${i})">Delete</button>
        </td>
        </tr>`;
    });

}
function addTask(){

    const task = document.getElementById("task").value;
    const category = document.getElementById("category").value;
    const priority = document.getElementById("priority").value;
    const status = document.getElementById("status").value;
    const due = document.getElementById("due").value;

    if(!task) return alert("Enter task");

    const newTask = {
        task: task,
        cat: category,
        priority: priority,
        status: status,
        due: due
    };

    if(editIndex === -1){
        tasks.push(newTask);
    } else {
        tasks[editIndex] = newTask;
        editIndex = -1;
    }

    document.getElementById("task").value = "";

    save();
    render();
    closeModal();
}

function editTask(i){
    document.getElementById("task").value = tasks[i].task;
    document.getElementById("category").value = tasks[i].cat;
    document.getElementById("priority").value = tasks[i].priority;
    document.getElementById("status").value = tasks[i].status;
    document.getElementById("due").value = tasks[i].due;

    editIndex = i;
    openModal();
}
function del(i){ tasks.splice(i,1); save(); render(); }

/* ===== TOGGLE ===== */
function showCheque(){
    taskSection.style.display="none";
    chequeSection.style.display="block";
    renderCheque();
}
function showTasks(){
    taskSection.style.display="block";
    chequeSection.style.display="none";
}

/* ===== CHEQUE SYSTEM (ADDED ONLY) ===== */
let cheques = JSON.parse(localStorage.getItem("cheques")) || [];
let chequeEditIndex = -1;

function saveCheque(){ localStorage.setItem("cheques", JSON.stringify(cheques)); }

function addCheque(){
    const data={
        client:client.value,
        chequeNo:chequeNo.value,
        amount:amount.value,
        due:chequeDue.value,
        status:chequeStatus.value
    };
    if(chequeEditIndex !== -1){
    if(!cheques[chequeEditIndex].history){
        cheques[chequeEditIndex].history = [];
    }

    cheques[chequeEditIndex].history.push({
        status: data.status,
        date: new Date().toLocaleString()
    });
}

    if(!data.client) return alert("Enter client");

    if(chequeEditIndex===-1) cheques.push(data);
    else { cheques[chequeEditIndex]=data; chequeEditIndex=-1; }

    client.value=""; chequeNo.value=""; amount.value=""; chequeDue.value="";

    saveCheque(); renderCheque();
}

function renderCheque(){
    const table=document.getElementById("chequeTable");
    const filter = document.getElementById("filterStatus").value;

    table.innerHTML=`<tr>
    <th>Client</th><th>Cheque</th><th>Amount</th>
    <th>Due</th><th>Status</th><th>Reminder</th><th>Action</th></tr>`;

    const today=new Date();

   [...cheques]
.sort((a,b)=> new Date(a.due) - new Date(b.due))
.forEach((c)=>{
    const realIndex = cheques.indexOf(c);
        if(filter !== "All" && c.status !== filter) return;

        const diff=Math.ceil((new Date(c.due)-today)/(1000*60*60*24));

        let reminder="";
        if(c.status==="Pending"){
            if(diff > 1) reminder = "Due in " + diff + " days";
            else if(diff === 1) reminder = "Due tomorrow";
            else if(diff === 0) reminder = "Due today";
            else reminder = "Overdue";
        }

        table.innerHTML+=`
        <tr class="${diff < 0 && c.status==='Pending' ? 'overdue-row' : ''}">
        <td>${c.client}</td>
        <td>${c.chequeNo}</td>
        <td>${c.amount}</td>
        <td>${c.due}</td>

        <td>
        <span class="status-badge ${
            c.status==="Pending" ? "pending" :
            c.status==="Deposited" ? "deposited" :
            c.status==="Paid (Cash)" ? "paid" :
            c.status==="Cleared" ? "paid" :
           
        }">
        ${c.status}
        </span>
        </td>

        <td>${reminder}</td>
        <td>
       <button onclick="editCheque(${realIndex})">Edit</button>
<button onclick="deleteCheque(${realIndex})">Delete</button>
        </td>
        </tr>`;
    });

    document.getElementById("totalCollected").innerText = collected;
    document.getElementById("totalPending").innerText = pending;
    document.getElementById("totalReturned").innerText = returned;

    // returned to client count
    let returnedToClient = cheques.filter(c => c.status==="Returned to Client").length;
    document.getElementById("returnedClientCount").innerText = returnedToClient;
}

function editCheque(i){
    const c=cheques[i];
    client.value=c.client;
    chequeNo.value=c.chequeNo;
    amount.value=c.amount;
    chequeDue.value=c.due;
    chequeStatus.value=c.status;
    chequeEditIndex=i;
}

function deleteCheque(i){
    if(confirm("Delete?")){
        cheques.splice(i,1);
        saveCheque();
        renderCheque();
    }
}

document.getElementById("totalCollected").innerText = collected;
document.getElementById("totalPending").innerText = pending;
document.getElementById("totalReturned").innerText = returned;
render();
</script>

</body>
</html>
