<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Details</title>

<style>
body{
    font-family:Segoe UI;
    margin:0;
    background:#f5f7fa;
}

.header{
    background:#2c5fa8;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    padding:20px;
    max-width:1100px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
    border-radius:10px;
    overflow:hidden;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
    font-size:13px;
}

th{
    background:#2c5fa8;
    color:white;
}

tr:nth-child(even){
    background:#f5f7fa;
}

tr:hover{
    background:#eef4ff;
}

button{
    padding:8px 12px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2 id="title">Client Details</h2>
</div>

<div class="container">

<button onclick="window.location.href='client.html'">
⬅ Back
</button>

<table id="detailsTable"></table>

</div>

<script>

let cheques = JSON.parse(localStorage.getItem("cheques")) || [];
let selectedClient = localStorage.getItem("selectedClient");

document.getElementById("title").textContent =
selectedClient || "Client Details";

function loadDetails(){

    const table = document.getElementById("detailsTable");

    table.innerHTML = `
    <tr>
        <th>#</th>
        <th>Cheque No</th>
        <th>Amount</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Date Returned</th>
        <th>Narration</th>
    </tr>`;

    let filtered = cheques.filter(c =>
        c.client === selectedClient
    );

    filtered.sort((a,b)=>
        new Date(a.due || 0) - new Date(b.due || 0)
    );

    if(filtered.length === 0){

        table.innerHTML += `
        <tr>
            <td colspan="7">No records found</td>
        </tr>`;

        return;
    }

    let total = 0;

    filtered.forEach((c,index)=>{

        const amount = Number(c.amount || 0);
        total += amount;

        let rowColor = "";

        if(c.status === "Returned to Client"){
            rowColor = "#ffe5e5";
        }

        if(c.status === "Bounced Cheque"){
            rowColor = "#fff3cd";
        }

        table.innerHTML += `
        <tr style="background:${rowColor}">
            <td>${index + 1}</td>
            <td>${c.chequeNo || "-"}</td>
            <td>QAR ${amount.toLocaleString()}</td>
            <td>${c.due || "-"}</td>
            <td>${c.status || "-"}</td>
            <td>${c.returnDate || "-"}</td>
            <td style="text-align:left">
                ${c.narration || "-"}
            </td>
        </tr>`;
    });

    table.innerHTML += `
    <tr style="font-weight:bold; background:#f1f4f9;">
        <td colspan="2">TOTAL</td>
        <td>QAR ${total.toLocaleString()}</td>
        <td colspan="4"></td>
    </tr>`;
}

loadDetails();

</script>

</body>
</html>
