<!DOCTYPE html>
<html>
<head>
<title>Cheque System</title>

<style>
body{
    font-family:Arial;
    background:#f4f7fb;
    padding:20px;
}

h2{
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:6px;
}

input,select{
    padding:8px;
    margin:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#2c5fa8;
    color:white;
}

.red{color:red;font-weight:bold;}
.green{color:green;font-weight:bold;}
</style>

</head>

<body>

<h2>Cheque Management System</h2>

<!-- FORM -->
<input id="client" placeholder="Client Name">
<input id="chequeNo" placeholder="Cheque No">
<input id="amount" type="number" placeholder="Amount">
<input id="due" type="date">

<select id="status">
<option>Pending</option>
<option>Deposited</option>
<option>Paid (Cash)</option>
<option>Returned</option>
</select>

<button onclick="addCheque()">Add Cheque</button>

<!-- TABLE -->
<table id="table"></table>

<script>

let cheques = JSON.parse(localStorage.getItem("cheques")) || [];

function save(){
    localStorage.setItem("cheques", JSON.stringify(cheques));
}

function addCheque(){

    const data={
        client:document.getElementById("client").value,
        chequeNo:document.getElementById("chequeNo").value,
        amount:document.getElementById("amount").value,
        due:document.getElementById("due").value,
        status:document.getElementById("status").value
    };

    if(!data.client) return alert("Enter client name");

    cheques.push(data);

    save();
    render();
}

function render(){

    const table=document.getElementById("table");

    table.innerHTML=`
    <tr>
    <th>Client</th>
    <th>Cheque No</th>
    <th>Amount</th>
    <th>Due</th>
    <th>Status</th>
    <th>Reminder</th>
    </tr>`;

    const today=new Date();

    cheques.forEach(c=>{

        const due=new Date(c.due);
        const diff=Math.ceil((due - today)/(1000*60*60*24));

        let reminder="";

        if(c.status === "Pending"){
            if(diff<=3 && diff>=0){
                reminder="⚠ Due Soon";
            } else if(diff<0){
                reminder="❌ Overdue";
            }
        }

        table.innerHTML+=`
        <tr>
        <td>${c.client}</td>
        <td>${c.chequeNo}</td>
        <td>${c.amount}</td>
        <td>${c.due}</td>
        <td>${c.status}</td>
        <td class="${diff<=3?'red':''}">${reminder}</td>
        </tr>`;
    });
}

render();

</script>

</body>
</html>
