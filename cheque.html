<!DOCTYPE html>
<html>
<head>
<title>Cheque System</title>

<style>
body{
    font-family:Arial;
    background:#f4f7fb;
    padding:20px;
}

h2{
    text-align:center;
}

button{
    padding:8px 12px;
    margin:3px;
    background:#2c5fa8;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

input,select{
    padding:8px;
    margin:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#2c5fa8;
    color:white;
}

.red{color:red;font-weight:bold;}
.green{color:green;font-weight:bold;}
</style>

</head>

<body>

<button onclick="openCheque()">Open Cheque System</button>

<div id="chequeBox" style="display:none;">

<h2>Cheque Management System</h2>
    
    <div style="margin-bottom:15px; text-align:center;">
<b>Total PDC:</b> <span id="totalPDC">0</span> |
<b>Pending:</b> <span id="totalPending">0</span> |
<b>Returned:</b> <span id="totalReturned">0</span>
</div>

<!-- FORM -->
<input id="client" placeholder="Client Name">
<input id="chequeNo" placeholder="Cheque No">
<input id="amount" type="number" placeholder="Amount">
<input id="due" type="date">

<select id="status">
<option>Pending</option>
<option>Deposited</option>
<option>Paid (Cash)</option>
<option>Returned</option>
</select>

<button onclick="addCheque()">Save Cheque</button>

<!-- TABLE -->
<table id="table"></table>

<script>

let cheques = JSON.parse(localStorage.getItem("cheques")) || [];
let editIndex = -1;

function save(){
    localStorage.setItem("cheques", JSON.stringify(cheques));
}

function addCheque(){

    const data={
        client:document.getElementById("client").value,
        chequeNo:document.getElementById("chequeNo").value,
        amount:document.getElementById("amount").value,
        due:document.getElementById("due").value,
        status:document.getElementById("status").value
    };

    if(!data.client) return alert("Enter client name");

    if(editIndex === -1){
        cheques.push(data);
    }else{
        cheques[editIndex] = data;
        editIndex = -1;
    }

    // clear form
    document.getElementById("client").value="";
    document.getElementById("chequeNo").value="";
    document.getElementById("amount").value="";
    document.getElementById("due").value="";

    save();
    render();
}

function render(){

    const table=document.getElementById("table");

    table.innerHTML=`
    <tr>
    <th>Client</th>
    <th>Cheque No</th>
    <th>Amount</th>
    <th>Due</th>
    <th>Status</th>
    <th>Reminder</th>
    <th>Action</th>
    </tr>
    `;

    const today=new Date();

    cheques.forEach((c,i)=>{

        const due=new Date(c.due);
        const diff=Math.ceil((due - today)/(1000*60*60*24));

        let reminder="";

        if(c.status === "Pending"){
            if(diff<=3 && diff>=0){
                reminder="⚠ Due Soon";
            } else if(diff<0){
                reminder="❌ Overdue";
            }
        }

        table.innerHTML+=`
        <tr>
        <td>${c.client}</td>
        <td>${c.chequeNo}</td>
        <td>${c.amount}</td>
        <td>${c.due}</td>
        <td>${c.status}</td>
        <td class="${diff<=3?'red':''}">${reminder}</td>
        <td>
            <button onclick="editCheque(${i})">Edit</button>
            <button onclick="deleteCheque(${i})">Delete</button>
        </td>
        </tr>
        // ===== TOTAL BASED ON PDC ONLY =====

// total PDC (may due date lang)
let totalPDC = cheques.filter(c => c.due).length;

// pending PDC
let totalPending = cheques.filter(c => c.due && c.status==="Pending").length;

// returned PDC
let totalReturned = cheques.filter(c => c.due && c.status==="Returned").length;

// display
document.getElementById("totalPDC").innerText = totalPDC;
document.getElementById("totalPending").innerText = totalPending;
document.getElementById("totalReturned").innerText = totalReturned;
        `;
    });
}

function editCheque(i){
    const c = cheques[i];

    document.getElementById("client").value = c.client;
    document.getElementById("chequeNo").value = c.chequeNo;
    document.getElementById("amount").value = c.amount;
    document.getElementById("due").value = c.due;
    document.getElementById("status").value = c.status;

    editIndex = i;
}

function deleteCheque(i){
    if(confirm("Delete this cheque?")){
        cheques.splice(i,1);
        save();
        render();
    }
}
function openCheque(){
    document.getElementById("chequeBox").style.display = "block";
}
render();

</script>
</div>
</body>
</html>
